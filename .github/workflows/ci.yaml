name: CI

on:
  push:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --ignore-scripts

      - name: Lint & Format Check
        run: bun vp check

      # - name: Test
      #   run: bun vp test
